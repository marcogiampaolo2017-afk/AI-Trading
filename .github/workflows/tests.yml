name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest pytest-timeout \
            "stable-baselines3>=2.0" \
            "sb3-contrib>=2.0" \
            gymnasium \
            numpy "pandas>=2.0" \
            hmmlearn \
            scipy \
            matplotlib \
            requests \
            "pandas-ta>=0.3.14b"

      - name: Verify imports
        run: |
          python -c "import numpy, pandas, gymnasium, hmmlearn; print('Core imports OK')"
          python -c "import pandas_ta; print('pandas_ta OK')" || echo "pandas_ta optional — skipping TA-dependent tests"
          python -c "import sys; sys.path.insert(0,'.');  from env.indicators import _safe_div; print('indicators OK')"
          python -c "import sys; sys.path.insert(0,'.'); from env.trading_env import ForexTradingEnv; print('trading_env OK')"

      - name: Run unit tests
        run: |
          pytest tests/test_indicators.py tests/test_trading_env.py \
            -v --tb=short \
            --timeout=120 \
            -k "not csv and not integration"
        env:
          PYTHONPATH: .
