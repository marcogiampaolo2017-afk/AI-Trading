name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install only non-MT5 dependencies (MT5 requires Windows)
          pip install stable-baselines3 sb3-contrib gymnasium numpy pandas pandas-ta customtkinter matplotlib requests || true

      - name: Run tests (synthetic data, skip MT5)
        run: |
          pytest tests/ -v --ignore=tests/test_integration.py \
            -k "not csv" \
            --tb=short
        env:
          # No MT5 credentials needed — tests use synthetic data
          PYTHONPATH: .
