name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core ML / RL — no MT5 (Windows-only), no customtkinter (needs display)
          pip install \
            pytest pytest-timeout \
            "stable-baselines3>=2.0" \
            "sb3-contrib>=2.0" \
            gymnasium \
            numpy pandas \
            hmmlearn \
            scipy \
            matplotlib \
            requests
          # pandas-ta: optional, tests fall back to synthetic data on failure
          pip install pandas-ta || echo "pandas-ta install skipped"

      - name: Run unit tests
        run: |
          pytest tests/test_indicators.py tests/test_trading_env.py \
            -v --tb=short \
            --timeout=120 \
            -k "not csv and not integration"
        env:
          PYTHONPATH: .
          # No MT5 credentials — tests use synthetic data only
